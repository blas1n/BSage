# Standard pre-commit hooks for BS projects
# See https://pre-commit.com for more information

# Pin to the Python version used by .devcontainer/Dockerfile (python:3.11-slim)
# and pyproject.toml (requires-python >= 3.11). Avoids host-default 3.14
# picking, which has libexpat ABI mismatches on some macOS installs.
default_language_version:
  python: python3.11

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: \.devcontainer/devcontainer\.json$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python linting + formatting (ruff replaces black + flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
      - id: ruff-format
