name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check bsage/

      - name: Format check (ruff format)
        run: uv run ruff format --check bsage/

      - name: Run tests with coverage
        run: uv run pytest bsage/tests/ --cov=bsage --cov-fail-under=80 -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate
      - name: Check package token
        id: package-token
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is not configured; Vercel preview remains the frontend build gate."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install dependencies
        if: steps.package-token.outputs.available == 'true'
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Lint
        if: steps.package-token.outputs.available == 'true'
        run: pnpm run lint
      - name: Build
        if: steps.package-token.outputs.available == 'true'
        run: pnpm run build
