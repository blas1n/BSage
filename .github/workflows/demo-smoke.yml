name: Demo smoke

# Boots demo backend (Docker) + builds & serves demo frontend, runs the
# @bsvibe/demo Playwright suite against the integrated stack.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  demo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COMPOSE_PROJECT: bsage-demo-ci
      BACKEND_PORT: '8900'
      FRONTEND_PORT: '3000'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Generate ephemeral demo secrets
        run: |
          {
            echo "DEMO_JWT_SECRET=$(openssl rand -hex 32)"
            echo "LLM_MODEL=mock"
            echo "LLM_API_KEY="
            echo "LLM_API_BASE="
            echo "EMBEDDING_MODEL="
            echo "EMBEDDING_API_KEY="
            echo "EMBEDDING_API_BASE="
            echo "SUPABASE_JWT_SECRET="
            echo "SUPABASE_URL="
            echo "SAFE_MODE=true"
            echo "CORS_ORIGINS=[\"http://localhost:3000\"]"
            echo "LOG_LEVEL=INFO"
          } > deploy/.env.demo

      - name: Prepare logs directory
        run: mkdir -p logs-demo

      - name: Build demo image
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            build app

      - name: Initialize vault volume permissions
        run: |
          # Named volume bsage-demo-vault is created root-owned by docker; the
          # app process runs as `appuser` (Dockerfile) and AuditOutbox.mkdir
          # fails with Errno 13 unless we pre-chown it.
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            run --rm --user root --entrypoint sh app -c "chown -R appuser:appuser /app/vault-demo /app/.credentials"

      - name: Boot demo backend stack
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            up -d
          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null --max-time 2 "http://localhost:${BACKEND_PORT}/api/health"; then
              echo "backend healthy"; break
            fi
            sleep 2
          done

      - name: Frontend deps
        working-directory: frontend
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Force playwright reuseExistingServer
        working-directory: frontend
        run: |
          # Our manually-started next start on port 3000 must be reused;
          # default config sets reuseExistingServer: !process.env.CI.
          sed -i 's/reuseExistingServer: !process.env.CI/reuseExistingServer: true/' playwright.config.ts

      - name: Build frontend in demo mode
        working-directory: frontend
        env:
          NEXT_PUBLIC_BSVIBE_DEMO: '1'
          NEXT_PUBLIC_API_URL: http://localhost:8900
        run: pnpm run build

      - name: Start frontend in background
        working-directory: frontend
        env:
          NEXT_PUBLIC_BSVIBE_DEMO: '1'
          NEXT_PUBLIC_API_URL: http://localhost:8900
        run: |
          nohup pnpm exec next start -p "$FRONTEND_PORT" > /tmp/frontend.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 2 "http://localhost:${FRONTEND_PORT}/"; then
              echo "frontend ready"; break
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run demo smoke suite
        working-directory: frontend
        env:
          DEMO_E2E_BASE_URL: http://localhost:3000
          DEMO_E2E_API_URL: http://localhost:8900
        run: pnpm exec playwright test --grep @demo --project=chromium

      - name: Frontend log (on failure)
        if: failure()
        run: tail -200 /tmp/frontend.log || true

      - name: Demo backend logs (on failure)
        if: failure()
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            logs --tail=200 app

      - name: Tear down
        if: always()
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            down -v
