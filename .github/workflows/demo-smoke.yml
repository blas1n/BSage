name: Demo smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  demo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Generate ephemeral demo secrets
        run: |
          {
            echo "DEMO_JWT_SECRET=$(openssl rand -hex 32)"
            echo "LLM_MODEL=mock"
            echo "LLM_API_KEY="
            echo "LLM_API_BASE="
            echo "EMBEDDING_MODEL="
            echo "EMBEDDING_API_KEY="
            echo "EMBEDDING_API_BASE="
            echo "SUPABASE_JWT_SECRET="
            echo "SUPABASE_URL="
            echo "SAFE_MODE=true"
            echo "CORS_ORIGINS=[\"http://localhost:8900\"]"
            echo "LOG_LEVEL=INFO"
          } > deploy/.env.demo

      - name: Boot demo stack
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          docker compose -p bsage-demo-ci \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            up -d --build --wait
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 2 http://localhost:8900/api/health; then
              echo "backend healthy"
              break
            fi
            sleep 2
          done

      - name: Frontend deps
        working-directory: frontend
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run demo smoke suite
        working-directory: frontend
        env:
          DEMO_E2E_BASE_URL: http://localhost:8900
          DEMO_E2E_API_URL: http://localhost:8900
        run: pnpm exec playwright test --grep @demo --project=chromium

      - name: Demo backend logs (on failure)
        if: failure()
        run: |
          docker compose -p bsage-demo-ci -f deploy/docker-compose.demo.yml logs --tail=200 app

      - name: Tear down
        if: always()
        run: |
          docker compose -p bsage-demo-ci -f deploy/docker-compose.demo.yml down -v
