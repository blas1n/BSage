name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: bsage
  HEALTH_URL: http://localhost:8400/api/health
  COMPOSE_FILE: deploy/docker-compose.yml

jobs:
  deploy:
    runs-on: [self-hosted, bsvibe]
    steps:
      - name: Pull latest
        run: |
          cd ~/Works/BSage/main
          git fetch origin main --quiet
          git merge origin/main --ff-only

      - name: Build and deploy
        run: |
          cd ~/Works/BSage/main
          docker compose -p ${{ env.PROJECT_NAME }} -f ${{ env.COMPOSE_FILE }} up -d --build

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            curl -sf ${{ env.HEALTH_URL }} > /dev/null && echo "✓ Healthy" && exit 0
            sleep 3
          done
          echo "✗ Health check failed" && exit 1
